name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x chepa-api/gradlew

      - name: Domain quality gate (tests + coverage)
        working-directory: chepa-api
        run: ./gradlew clean ciDomainCoverage -PdomainCoverageMinimum=0.70

      - name: Upload domain test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-test-reports
          path: chepa-api/build/reports/tests/domainTest
          if-no-files-found: warn

      - name: Upload domain coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-coverage-reports
          path: |
            chepa-api/build/reports/jacoco/jacocoDomainTestReport/html
            chepa-api/build/reports/jacoco/jacocoDomainTestReport/jacocoDomainTestReport.xml
          if-no-files-found: warn

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g \
            semantic-release@24.2.3 \
            @semantic-release/commit-analyzer@13.0.1 \
            @semantic-release/release-notes-generator@14.0.3 \
            @semantic-release/github@11.0.1

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release