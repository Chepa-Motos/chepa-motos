spring.datasource.url=jdbc:tc:postgresql:18:///chepa_motos_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.jackson.time-zone=America/Bogota
spring.sql.init.mode=always

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

auth.jwt.secret=test-secret-key-with-at-least-32-characters-123456
auth.jwt.access-token-ttl-minutes=15
auth.jwt.refresh-token-ttl-days=7
