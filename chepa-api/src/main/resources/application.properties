spring.application.name=chepa-api

# ==========================================
# DATABASE (SAFE CONFIG)
# ==========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chepa_motos}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (override with env vars when needed)
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

# ==========================================
# JPA / HIBERNATE (SAFE DEFAULTS)
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# Schema/data scripts are managed by Docker init, not Spring Boot runtime
spring.sql.init.mode=never

# ==========================================
# SERVER
# ==========================================
server.port=${SERVER_PORT:8080}

# ==========================================
# LOGGING
# ==========================================
logging.level.org.hibernate.SQL=${LOG_HIBERNATE_SQL:INFO}

# ==========================================
# OPENAPI / SWAGGER
# ==========================================
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html