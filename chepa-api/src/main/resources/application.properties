spring.application.name=chepa-api

# -------------------------------------------------------------
# Server
# -------------------------------------------------------------
server.port=${SERVER_PORT:8080}
server.shutdown=graceful

# -------------------------------------------------------------
# DataSource (PostgreSQL)
# Uses env vars so secrets are never committed.
# Required env var: DB_PASSWORD
# -------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chepa_motos}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool defaults (override via env vars when needed)
spring.datasource.hikari.pool-name=ChepaHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}

# -------------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public

# SQL initialization is handled by Docker Postgres init scripts in /init
spring.sql.init.mode=never

# -------------------------------------------------------------
# JSON / Time
# -------------------------------------------------------------
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# -------------------------------------------------------------
# Logging
# -------------------------------------------------------------
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:WARN}