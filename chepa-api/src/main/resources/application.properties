spring.application.name=chepa-api

# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS POSTGRESQL
# ==========================================

# URL de conexión a PostgreSQL en Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/chepa_motos
spring.datasource.username=postgres
spring.datasource.password=postgres

# Driver de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================

# Mostrar queries SQL en consola 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Estrategia de generación de esquema
# update: crea/actualiza tablas automáticamente sin borrar datos
spring.jpa.hibernate.ddl-auto=update

# Dialecto de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================

# Puerto donde corre la API
server.port=8080

# ==========================================
# LOGGING
# ==========================================

# Nivel de logging para SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE